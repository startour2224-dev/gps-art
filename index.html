<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI GPS Art Walker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 55vh; width: 100%; border-radius: 1.5rem; z-index: 1; }
        .glass-morphism { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4f46e5; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">

    <div class="max-w-md mx-auto p-4 flex flex-col gap-4 pb-24">
        <header class="text-center py-2">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">AI GPS Art</h1>
            <p class="text-[10px] text-slate-500 font-medium">Gemini AIがあなたの歩みを鑑定します</p>
        </header>

        <div class="relative shadow-2xl overflow-hidden rounded-3xl border-4 border-white">
            <div id="map"></div>
            <!-- Z-indexの修正 -->
            <div class="absolute top-4 left-4 z- glass-morphism px-3 py-1.5 rounded-full text-[10px] font-bold shadow-md flex items-center gap-2">
                <span id="status-dot" class="w-2 h-2 bg-slate-400 rounded-full"></span>
                <div id="stats">0.00 km</div>
            </div>
        </div>

        <div id="ai-panel" class="hidden bg-white p-5 rounded-3xl shadow-sm border border-indigo-100 flex flex-col gap-2">
            <h3 id="ai-title" class="font-black text-indigo-900 text-lg"></h3>
            <p id="ai-desc" class="text-xs text-indigo-700 italic leading-relaxed"></p>
        </div>

        <div class="glass-morphism p-6 rounded-3xl shadow-xl flex flex-col gap-3">
            <button id="start-btn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3 text-lg">
                ▶️ お絵かき開始
            </button>
            
            <div id="ai-controls" class="hidden flex gap-2">
                <button id="analyze-btn" class="flex-1 bg-purple-100 text-purple-700 font-bold py-3 rounded-xl text-sm flex items-center justify-center gap-2">
                    ✨ AI鑑定
                </button>
                <button id="reset-btn" class="flex-1 bg-slate-100 text-slate-500 font-bold py-3 rounded-xl text-sm">
                    リセット
                </button>
            </div>
        </div>
    </div>

    <script>
        // 提供されたAPIキーを設定
        const apiKey = "AIzaSyBEk_Xrvnx89FDbdWx-EoYj0tUY3qOtFFA"; 

        let map, pathLine, isTracking = false, watchId = null;
        let points = [], totalDistance = 0, userMarker = null, wakeLock = null;

        function init() {
            map = L.map('map', { zoomControl: false }).setView([35.6812, 139.7671], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            pathLine = L.polyline([], { color: '#4f46e5', weight: 8, opacity: 0.8, lineJoin: 'round' }).addTo(map);

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const latlng = [pos.coords.latitude, pos.coords.longitude];
                    map.setView(latlng, 17);
                    if (userMarker) map.removeLayer(userMarker);
                    userMarker = L.circleMarker(latlng, { radius: 8, color: '#fff', fillColor: '#4f46e5', fillOpacity: 1, weight: 3 }).addTo(map);
                    document.getElementById('status-dot').classList.replace('bg-slate-400', 'bg-green-500');
                }, (err) => {
                    alert("位置情報を許可してください。設定 > ブラウザ > 位置情報 で変更できます。");
                }, { enableHighAccuracy: true });
            }

            document.getElementById('start-btn').addEventListener('click', toggleTracking);
            document.getElementById('analyze-btn').addEventListener('click', analyzeArt);
            document.getElementById('reset-btn').addEventListener('click', () => location.reload());
        }

        async function toggleTracking() {
            const btn = document.getElementById('start-btn');
            const aiControls = document.getElementById('ai-controls');

            if (!isTracking) {
                isTracking = true;
                points = []; totalDistance = 0;
                btn.innerText = "⏹️ 記録を停止";
                btn.classList.replace('bg-indigo-600', 'bg-rose-500');
                if ('wakeLock' in navigator) {
                    try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
                }

                watchId = navigator.geolocation.watchPosition(pos => {
                    const latlng = [pos.coords.latitude, pos.coords.longitude];
                    if (points.length > 0) {
                        totalDistance += L.latLng(points[points.length-1]).distanceTo(L.latLng(latlng));
                        document.getElementById('stats').innerText = `${(totalDistance/1000).toFixed(2)} km`;
                    }
                    points.push(latlng);
                    pathLine.setLatLngs(points);
                    map.panTo(latlng);
                    if (userMarker) userMarker.setLatLng(latlng);
                }, null, { enableHighAccuracy: true });
            } else {
                isTracking = false;
                navigator.geolocation.clearWatch(watchId);
                if (wakeLock) wakeLock.release();
                btn.classList.add('hidden');
                aiControls.classList.remove('hidden');
            }
        }

        async function analyzeArt() {
            if (points.length < 3) return alert("まずは少し歩いてみてください！");
            const btn = document.getElementById('analyze-btn');
            btn.disabled = true;
            btn.innerHTML = '<div class="loading-spinner"></div> 鑑定中...';

            // 修正：座標データを正しく文字列化
            const step = Math.ceil(points.length / 30);
            const sampled = points.filter((_, i) => i % step === 0).map(p => `[${p.toFixed(5)},${p.toFixed(5)}]`).join(',');

            const prompt = `以下のGPS座標の軌跡を、一つの現代アート作品として評価し、カッコいいタイトルと100文字程度の解説を日本語で作成してください。JSON形式 { "title": "...", "description": "..." } で返してください。データ: ${sampled}`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: [{ text: prompt }] }], 
                        generationConfig: { responseMimeType: "application/json" } 
                    })
                });
                
                const data = await response.json();
                // 修正：レスポンスのパース処理
                const text = data.candidates?.?.content?.parts?.?.text;
                if (!text) throw new Error("API Response Error");
                
                const res = JSON.parse(text);

                document.getElementById('ai-title').innerText = "作品名: " + res.title;
                document.getElementById('ai-desc').innerText = res.description;
                document.getElementById('ai-panel').classList.remove('hidden');
            } catch (e) {
                console.error(e);
                alert("AI鑑定に失敗しました。電波の良い場所で再度お試しください。");
            } finally {
                btn.disabled = false;
                btn.innerText = "✨ 再鑑定";
            }
        }

        window.addEventListener('load', init);
    </script>
</body>
</html>
