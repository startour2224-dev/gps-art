<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Art Walker + Gemini API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet.js for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 50vh; width: 100%; border-radius: 1.5rem; z-index: 1; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .loading-spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4f46e5;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">

    <div class="max-w-md mx-auto p-4 flex flex-col gap-4 pb-24">
        <!-- Header -->
        <header class="text-center py-4">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">GPS Art Walker</h1>
            <p class="text-xs text-slate-500 font-medium">✨ Gemini AIがあなたの歩みをアートに変える</p>
        </header>

        <!-- Map Container -->
        <div class="relative shadow-2xl overflow-hidden rounded-3xl border-4 border-white">
            <div id="map"></div>
            <!-- Overlay Info -->
            <div class="absolute top-4 left-4 z- glass-morphism px-3 py-1.5 rounded-full text-[10px] font-bold shadow-md flex items-center gap-2">
                <span class="w-2 h-2 bg-indigo-500 rounded-full animate-ping"></span>
                <div id="stats">距離: 0.00 km</div>
            </div>
            <!-- Target Preview -->
            <div id="target-preview" class="absolute bottom-4 right-4 z- glass-morphism p-3 rounded-2xl hidden shadow-lg border border-indigo-100">
                <p class="text-[9px] font-bold text-indigo-400 uppercase tracking-tighter mb-1">見本ガイド</p>
                <svg id="preview-svg" width="80" height="80" viewBox="0 0 100 100" class="stroke-indigo-500 fill-none stroke-"></svg>
            </div>
        </div>

        <!-- AI Assistant Panel -->
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100 flex flex-col gap-4">
            <h3 class="text-sm font-bold text-slate-700 flex items-center gap-2">
                <span class="text-lg">✨</span> Gemini 散歩アシスタント
            </h3>
            <button onclick="generateCustomTask()" id="ai-task-btn" class="w-full bg-indigo-50 hover:bg-indigo-100 text-indigo-600 text-xs font-bold py-3 rounded-2xl transition flex items-center justify-center gap-2 border border-indigo-100">
                お題を自動生成
            </button>
            <div id="ai-status" class="text-[10px] text-center text-indigo-400 italic hidden">Geminiが最適なルートを計算中...</div>
        </div>

        <!-- Controls -->
        <div class="glass-morphism p-6 rounded-3xl shadow-xl flex flex-col gap-5">
            <div id="mode-selector" class="flex bg-slate-100 p-1 rounded-2xl">
                <button onclick="setMode('free')" id="btn-free" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-indigo-600">自由にお絵かき</button>
                <button onclick="setMode('challenge')" id="btn-challenge" class="flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-400">お題に挑戦</button>
            </div>

            <div id="challenge-options" class="hidden space-y-3">
                <div class="grid grid-cols-3 gap-2" id="shape-list">
                    <button onclick="selectShape('star')" class="shape-btn bg-white border-2 border-slate-100 p-3 rounded-2xl text-lg hover:border-indigo-300">⭐</button>
                    <button onclick="selectShape('heart')" class="shape-btn bg-white border-2 border-slate-100 p-3 rounded-2xl text-lg hover:border-indigo-300">❤️</button>
                    <button onclick="selectShape('circle')" class="shape-btn bg-white border-2 border-slate-100 p-3 rounded-2xl text-lg hover:border-indigo-300">⭕</button>
                </div>
            </div>

            <div class="flex flex-col gap-3">
                <button id="start-btn" onclick="toggleTracking()" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg shadow-indigo-200 active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span id="btn-icon">▶️</span>
                    <span id="btn-text" class="text-lg">お絵かき開始</span>
                </button>
                <button id="reset-btn" onclick="resetArt()" class="w-full text-slate-400 font-bold py-2 text-xs">リセット</button>
            </div>
        </div>
    </div>

    <!-- UI Modal -->
    <div id="modal" class="fixed inset-0 bg-slate-900/80 hidden items-center justify-center z- p-6 backdrop-blur-md">
        <div class="bg-white rounded-[2.5rem] p-8 w-full max-sm text-center shadow-2xl">
            <h2 class="text-2xl font-black text-slate-800 mb-2">作品が完成！</h2>
            <p class="text-slate-500 text-sm mb-6" id="completion-msg"></p>
            <div id="ai-analysis" class="mb-6 p-5 bg-indigo-50 rounded-3xl text-left hidden border border-indigo-100">
                <h4 id="art-title" class="font-black text-indigo-900 text-lg mb-2"></h4>
                <p id="art-description" class="text-xs text-indigo-700 italic"></p>
            </div>
            <div id="analysis-loading" class="mb-6 hidden flex flex-col items-center gap-2">
                <div class="loading-spinner"></div>
                <p class="text-xs text-slate-400">AI鑑定中...</p>
            </div>
            <button id="analyze-btn" onclick="analyzeMyArt()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl mb-3">AIに鑑定してもらう</button>
            <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-500 font-bold py-3 rounded-2xl text-sm">閉じる</button>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let map, pathLine, targetLine;
        let isTracking = false;
        let watchId = null;
        let points = [];
        let totalDistance = 0;
        let currentMode = 'free';
        let centerLatLng = [35.6812, 139.7671]; 

        // 座標データを正しく復元
        const shapes = {
            star: [,,,,,,,,,,],
            heart: [,,,,,,,,],
            circle: Array.from({length: 37}, (_, i) => [
                50 + 40 * Math.cos(i * 10 * Math.PI / 180), 
                50 + 40 * Math.sin(i * 10 * Math.PI / 180)
            ])
        };

        function initMap() {
            map = L.map('map', { zoomControl: false }).setView(centerLatLng, 15);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            pathLine = L.polyline([], { color: '#4f46e5', weight: 6, opacity: 0.8 }).addTo(map);
            targetLine = L.polyline([], { color: '#94a3b8', weight: 3, dashArray: '8, 8', opacity: 0.4 }).addTo(map);

            // ロード直後にGPS許可を求める
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    centerLatLng = [pos.coords.latitude, pos.coords.longitude];
                    map.setView(centerLatLng, 17);
                    L.marker(centerLatLng).addTo(map).bindPopup("現在地").openPopup();
                }, (err) => {
                    console.error("Geolocation error:", err);
                    alert("GPSを許可してください。設定 > ブラウザ > 位置情報 で変更できます。");
                }, { enableHighAccuracy: true });
            }
        }

        async function callGemini(prompt, systemPrompt = "", isJson = false) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };
            if (isJson) payload.generationConfig = { responseMimeType: "application/json" };
            
            try {
                const resp = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await resp.json();
                return data.candidates?.?.content?.parts?.?.text;
            } catch (e) {
                console.error("Gemini API Error:", e);
                return null;
            }
        }

        async function generateCustomTask() {
            const status = document.getElementById('ai-status');
            status.classList.remove('hidden');
            try {
                const sys = "JSON: {name, emoji, points:[[x,y],...], tip}";
                const res = await callGemini("面白い一筆書きを1つ提案して", sys, true);
                if (!res) return;
                const data = JSON.parse(res);
                const id = `ai_${Date.now()}`;
                shapes[id] = data.points;
                const btn = document.createElement('button');
                btn.className = "shape-btn bg-indigo-50 border-2 border-indigo-200 p-3 rounded-2xl text-lg";
                btn.innerHTML = data.emoji;
                btn.onclick = () => selectShape(id);
                document.getElementById('shape-list').prepend(btn);
                selectShape(id);
                setMode('challenge');
            } catch (err) {
                console.error("Task Gen Error:", err);
            } finally { status.classList.add('hidden'); }
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-free').className = mode === 'free' ? 'flex-1 py-2.5 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-indigo-600' : 'flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-400';
            document.getElementById('btn-challenge').className = mode === 'challenge' ? 'flex-1 py-2.5 rounded-xl text-xs font-bold transition-all bg-white shadow-sm text-indigo-600' : 'flex-1 py-2.5 rounded-xl text-xs font-bold transition-all text-slate-400';
            document.getElementById('challenge-options').classList.toggle('hidden', mode === 'free');
            if (mode === 'free') {
                targetLine.setLatLngs([]);
                document.getElementById('target-preview').classList.add('hidden');
            }
        }

        function selectShape(id) {
            const preview = document.getElementById('target-preview');
            const svg = document.getElementById('preview-svg');
            preview.classList.remove('hidden');
            const shapeData = shapes[id];
            
            // 描画用のパス作成
            const pathStr = shapeData.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p} ${p}`).join(' ');
            svg.innerHTML = `<path d="${pathStr}" fill="none" stroke="currentColor" stroke-width="3" />`;
            
            // 地図上の座標に変換
            const scale = 0.0002;
            const coords = shapeData.map(p => [
                centerLatLng + (50 - p) * scale,
                centerLatLng + (p - 50) * scale * 1.5
            ]);
            targetLine.setLatLngs(coords);
            map.fitBounds(targetLine.getBounds(), { padding: });
        }

        function toggleTracking() {
            if (!isTracking) {
                isTracking = true;
                points = []; totalDistance = 0;
                pathLine.setLatLngs([]);
                document.getElementById('btn-text').innerText = "お絵かきを終了";
                document.getElementById('start-btn').classList.replace('bg-indigo-600', 'bg-rose-500');
                
                watchId = navigator.geolocation.watchPosition(pos => {
                    const latlng = [pos.coords.latitude, pos.coords.longitude];
                    if (points.length > 0) {
                        totalDistance += L.latLng(points[points.length - 1]).distanceTo(L.latLng(latlng));
                        document.getElementById('stats').innerText = `距離: ${(totalDistance / 1000).toFixed(2)} km`;
                    }
                    points.push(latlng);
                    pathLine.setLatLngs(points);
                    map.panTo(latlng);
                }, (err) => console.error(err), { enableHighAccuracy: true });
            } else {
                isTracking = false;
                if (watchId) navigator.geolocation.clearWatch(watchId);
                document.getElementById('completion-msg').innerText = `走行距離: ${(totalDistance / 1000).toFixed(2)}km`;
                document.getElementById('modal').classList.remove('hidden');
                document.getElementById('modal').classList.add('flex');
            }
        }

        async function analyzeMyArt() {
            if (points.length < 2) return;
            document.getElementById('analysis-loading').classList.remove('hidden');
            document.getElementById('analyze-btn').classList.add('hidden');
            try {
                const sampled = points.filter((_, i) => i % 5 === 0).map(p => `[${p.toFixed(5)},${p.toFixed(5)}]`).join(',');
                const sys = "GPSの軌跡を現代アートとして解説してください。JSON: {title, description}";
                const res = await callGemini(`軌跡データ: ${sampled}`, sys, true);
                if (!res) throw new Error();
                const data = JSON.parse(res);
                document.getElementById('art-title').innerText = data.title;
                document.getElementById('art-description').innerText = data.description;
                document.getElementById('ai-analysis').classList.remove('hidden');
            } catch (e) {
                document.getElementById('art-title').innerText = "都市の軌跡";
                document.getElementById('art-description').innerText = "あなたの歩みは街に新しい物語を描きました。";
                document.getElementById('ai-analysis').classList.remove('hidden');
            } finally { document.getElementById('analysis-loading').classList.add('hidden'); }
        }

        function resetArt() {
            points = []; totalDistance = 0;
            pathLine.setLatLngs([]);
            document.getElementById('stats').innerText = `距離: 0.00 km`;
        }

        function closeModal() { 
            document.getElementById('modal').classList.add('hidden');
            document.getElementById('modal').classList.remove('flex');
            document.getElementById('analyze-btn').classList.remove('hidden');
            document.getElementById('ai-analysis').classList.add('hidden');
        }

        window.onload = initMap;
    </script>
</body>
</html>
