<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GPS Art Walker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Leaflet.js for Maps -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { height: 60vh; width: 100%; border-radius: 1.5rem; z-index: 1; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        body { touch-action: manipulation; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">

    <div class="max-w-md mx-auto p-4 flex flex-col gap-4 pb-24">
        <!-- Header -->
        <header class="text-center py-4">
            <h1 class="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600">GPS Art Walker</h1>
            <p class="text-xs text-slate-500 font-medium">歩いて地図に絵を描こう</p>
        </header>

        <!-- Map Container -->
        <div class="relative shadow-2xl overflow-hidden rounded-3xl border-4 border-white">
            <div id="map"></div>
            <!-- Overlay Info -->
            <div class="absolute top-4 left-4 z- glass-morphism px-3 py-1.5 rounded-full text-[10px] font-bold shadow-md flex items-center gap-2">
                <span id="status-dot" class="w-2 h-2 bg-slate-400 rounded-full"></span>
                <div id="stats">距離: 0.00 km</div>
            </div>
        </div>

        <!-- Controls -->
        <div class="glass-morphism p-6 rounded-3xl shadow-xl flex flex-col gap-4">
            <div class="flex flex-col gap-3">
                <button id="start-btn" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg active:scale-95 transition-all flex items-center justify-center gap-3">
                    <span id="btn-icon">▶️</span>
                    <span id="btn-text" class="text-lg">お絵かき開始</span>
                </button>
                <button id="reset-btn" class="w-full bg-white border border-slate-200 text-slate-500 font-bold py-3 rounded-2xl text-sm active:bg-slate-50">
                    リセット
                </button>
            </div>
            <p class="text-[10px] text-center text-slate-400">※ GPSをONにして、屋外の開けた場所で使用してください</p>
        </div>
    </div>

    <script>
        let map;
        let pathLine;
        let isTracking = false;
        let watchId = null;
        let points = [];
        let totalDistance = 0;
        let userMarker = null;

        // 初期化処理
        function init() {
            // デフォルト表示（東京駅周辺）
            const defaultPos = [35.6812, 139.7671];
            
            map = L.map('map', { 
                zoomControl: false,
                dragging: true,
                touchZoom: true
            }).setView(defaultPos, 16);

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);

            pathLine = L.polyline([], { 
                color: '#4f46e5', 
                weight: 8, 
                opacity: 0.8,
                lineJoin: 'round'
            }).addTo(map);

            // ページ読み込みと同時に位置情報を1回取得（許可プロンプトを出す）
            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (pos) => {
                        const latlng = [pos.coords.latitude, pos.coords.longitude];
                        map.setView(latlng, 17);
                        if (userMarker) map.removeLayer(userMarker);
                        userMarker = L.circleMarker(latlng, { radius: 8, color: '#fff', fillColor: '#4f46e5', fillOpacity: 1, weight: 3 }).addTo(map);
                        document.getElementById('status-dot').classList.replace('bg-slate-400', 'bg-green-500');
                    },
                    (err) => {
                        handleLocationError(err);
                    },
                    { enableHighAccuracy: true }
                );
            } else {
                alert("お使いのブラウザはGPSに対応していません。");
            }

            // ボタンイベント登録
            document.getElementById('start-btn').addEventListener('click', toggleTracking);
            document.getElementById('reset-btn').addEventListener('click', resetArt);
        }

        function handleLocationError(err) {
            let msg = "位置情報の取得に失敗しました。";
            if (err.code === 1) msg = "位置情報の利用が拒否されています。ブラウザの設定で許可してください。";
            if (err.code === 2) msg = "位置情報が特定できません（電波状況を確認してください）。";
            if (err.code === 3) msg = "タイムアウトしました。";
            alert(msg);
        }

        function toggleTracking() {
            const btn = document.getElementById('start-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const statusDot = document.getElementById('status-dot');

            if (!isTracking) {
                // 開始処理
                isTracking = true;
                btnText.innerText = "記録を停止";
                btnIcon.innerText = "⏹️";
                btn.classList.replace('bg-indigo-600', 'bg-rose-500');
                statusDot.classList.add('animate-ping');
                statusDot.classList.replace('bg-green-500', 'bg-rose-500');

                watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const latlng = [pos.coords.latitude, pos.coords.longitude];
                        
                        // 前の地点からの距離計算
                        if (points.length > 0) {
                            const lastPoint = L.latLng(points[points.length - 1]);
                            const currentPoint = L.latLng(latlng);
                            const dist = lastPoint.distanceTo(currentPoint);
                            
                            // 誤差を無視するため、2m以上動いた場合のみ記録
                            if (dist > 2) {
                                totalDistance += dist;
                                points.push(latlng);
                                pathLine.setLatLngs(points);
                                document.getElementById('stats').innerText = `距離: ${(totalDistance / 1000).toFixed(2)} km`;
                            }
                        } else {
                            points.push(latlng);
                        }

                        // マーカー更新
                        if (userMarker) userMarker.setLatLng(latlng);
                        map.panTo(latlng);
                    },
                    (err) => {
                        console.error(err);
                    },
                    { 
                        enableHighAccuracy: true,
                        maximumAge: 1000,
                        timeout: 5000
                    }
                );
            } else {
                // 停止処理
                isTracking = false;
                navigator.geolocation.clearWatch(watchId);
                btnText.innerText = "お絵かき開始";
                btnIcon.innerText = "▶️";
                btn.classList.replace('bg-rose-500', 'bg-indigo-600');
                statusDot.classList.remove('animate-ping');
                statusDot.classList.replace('bg-rose-500', 'bg-green-500');
                
                alert(`お疲れ様でした！\n合計距離: ${(totalDistance / 1000).toFixed(2)} km`);
            }
        }

        function resetArt() {
            if (isTracking) return alert("記録を停止してからリセットしてください。");
            if (confirm("描いた絵を消去しますか？")) {
                points = [];
                totalDistance = 0;
                pathLine.setLatLngs([]);
                document.getElementById('stats').innerText = `距離: 0.00 km`;
            }
        }

        // ロード完了時に起動
        window.addEventListener('load', init);
    </script>
</body>
</html>
